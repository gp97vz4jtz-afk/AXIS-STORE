<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS | مِحور الفخامة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #fff; }
        .gold-text { background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-axis { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.4s; }
        .card-axis:hover { border-color: #B38728; transform: translateY(-10px); }
    </style>
</head>
<body>
    <header class="p-6 border-b border-white/5 bg-black/90 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-4xl font-black gold-text">AXIS</h1>
            <div class="text-sm space-x-reverse space-x-6">

                <a href="#payment" class="hover:text-yellow-500">الدفع</a>
            </div>
        </div>
    </header>

    <section class="py-20 text-center">
        <h2 class="text-6xl font-bold mb-4">AXIS</h2>
        <p class="text-gray-400">مِحور السيادة في عالم الموضة والجمال</p>
    </section>

    <section id="store" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 py-10">
        <div class="card-axis p-8 rounded-xl text-center">
            <div class="text-5xl mb-4">👔</div>
            <h3 class="text-xl font-bold mb-4">الأزياء الرجالية والنسائية</h3>
            <button onclick="order('الأزياء')" class="bg-yellow-600 text-black px-6 py-2 rounded-full font-bold">تسوق الآن</button>
        </div>
        <div class="card-axis p-8 rounded-xl text-center">
            <div class="text-5xl mb-4">👠</div>
            <h3 class="text-xl font-bold mb-4">الأحذية والحقائب</h3>
            <button onclick="order('الأحذية والحقائب')" class="bg-yellow-600 text-black px-6 py-2 rounded-full font-bold">تسوق الآن</button>
        </div>
        <div class="card-axis p-8 rounded-xl text-center">
            <div class="text-5xl mb-4">✨</div>
            <h3 class="text-xl font-bold mb-4">التجميل والعناية</h3>
            <button onclick="order('التجميل والعناية')" class="bg-yellow-600 text-black px-6 py-2 rounded-full font-bold">تسوق الآن</button>
        </div>
    </section>

    <section id="payment" class="bg-zinc-950 py-16 mt-10">
        <div class="container mx-auto px-6 text-center">
            <h3 class="gold-text text-2xl font-bold mb-8">حسابات كريمي المعتمدة</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                <div class="p-4 border border-yellow-900/30 rounded">يمني: 3156241937</div>
                <div class="p-4 border border-yellow-900/30 rounded">دولار: 3113900805</div>
                <div class="p-4 border border-yellow-900/30 rounded">سعودي: 3178475427</div>
            </div>
        </div>
    </section>

    <footer class="p-10 text-center border-t border-white/5">
        <p class="text-yellow-500 font-bold mb-2">للتواصل المباشر:</p>
        <p dir="ltr">+967 772 675 315</p>
        <p dir="ltr">+967 778 065 086</p>
        <p class="mt-4 text-gray-600 text-xs">Instagram: 3._s__9</p>
    </footer>

    <script>
        function order(cat) {
            const msg = "مرحباً AXIS، أود الاستفسار عن قسم " + cat;
            window.open("https://wa.me/967772675315?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
