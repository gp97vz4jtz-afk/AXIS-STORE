<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZONE STORE | متجر أوزون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f9fafb; }
        .cart-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black text-black">OZONE</h1>
        <button onclick="toggleCart()" class="relative p-2 bg-gray-100 rounded-full">
            🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div id="product-list" class="p-4 grid grid-cols-2 gap-4">
        </div>

    <div id="cart-modal" class="cart-modal">
        <div class="bg-white w-full max-w-md mx-auto mt-20 rounded-t-3xl p-6 h-full overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">حقيبة التسوق</h2>
                <button onclick="toggleCart()" class="text-2xl">✕</button>
            </div>
            <div id="cart-items" class="space-y-4">
                </div>
            <div class="border-t mt-6 pt-4">
                <div class="flex justify-between font-bold text-lg">
                    <span>الإجمالي:</span>
                    <span id="cart-total">0</span><span> ريال</span>
                </div>
                <div class="mt-4 space-y-2">
                    <p class="text-xs text-gray-500">طرق الدفع المتاحة: الكريمي، النجم، جيب</p>
                    <button onclick="checkout()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">تأكيد الطلب والدفع 💳</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- لوحة التحكم (أضف منتجاتك هنا بسهولة) ---
        const products = [
            { id: 1, name: "حذاء رياضي Nike", price: 15000, img: "https://via.placeholder.com/150", cat: "shoes" },
            { id: 2, name: "ساعة ذكية Ultra", price: 12000, img: "https://via.placeholder.com/150", cat: "tech" },
            { id: 3, name: "حقيبة يد نسائية", price: 9500, img: "https://via.placeholder.com/150", cat: "bags" }
        ];

        let cart = [];

        // عرض المنتجات
        function displayProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                    <img src="${p.img}" class="w-full h-32 object-contain rounded-xl mb-2">
                    <h3 class="text-xs font-bold">${p.name}</h3>
                    <p class="text-yellow-600 font-black text-sm mt-1">${p.price.toLocaleString()} ر.ي</p>
                    <button onclick="addToCart(${p.id})" class="w-full mt-2 bg-gray-900 text-white py-2 rounded-lg text-[10px]">إضافة للسلة</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartList = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            
            let total = 0;
            cartList.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                        <div class="text-xs font-bold">${item.name}</div>
                        <div class="text-xs">${item.price.toLocaleString()} ر.ي</div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-xs">حذف</button>
                    </div>
                `;
            }).join('');
            totalDisplay.innerText = total.toLocaleString();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        function checkout() {
            if(cart.length === 0) return alert("السلة فارغة!");
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const itemsList = cart.map(i => i.name).join(' + ');
            
            const message = `طلب جديد من OZONE STORE 🔥%0A%0A📦 المنتجات: ${itemsList}%0A💰 الإجمالي: ${total.toLocaleString()} ريال%0A%0Aيرجى تزويدي ببيانات التحويل (كريمي/نجم) لإتمام الدفع.`;
            window.open(`https://wa.me/967772675315?text=${message}`, '_blank');
        }

        displayProducts();
    </script>
</body>
</html>
